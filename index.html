<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SylhetStories — Climate Exhibition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050d1a;color:#e2e8f0;font-family:'Source Sans 3',sans-serif;overflow-x:hidden}
@keyframes fall{from{transform:translateY(-20px);opacity:0}10%{opacity:1}90%{opacity:1}to{transform:translateY(100vh);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.fadeUp{animation:fadeUp 0.5s ease forwards}
.raindrop{position:fixed;width:2px;background:linear-gradient(to bottom,transparent,rgba(148,210,255,0.5));border-radius:1px;animation:fall linear infinite;pointer-events:none;z-index:0}
nav{position:sticky;top:0;z-index:100;background:rgba(5,13,26,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(56,189,248,0.15);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:linear-gradient(90deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.navs{display:flex;gap:20px;flex-wrap:wrap}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;cursor:pointer;font-size:13px;font-family:'Source Sans 3',sans-serif;font-weight:600;letter-spacing:.05em;padding-bottom:4px;transition:all .2s}
.nav-btn:hover,.nav-btn.active{color:#38bdf8;border-bottom-color:#38bdf8}
.section{max-width:900px;margin:0 auto;padding:48px 24px;position:relative;z-index:1}
.hero{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;background:radial-gradient(ellipse at 50% 60%,rgba(14,165,233,0.08) 0%,transparent 70%);position:relative;z-index:1}
h1{font-family:'Playfair Display',serif;font-size:clamp(42px,8vw,88px);font-weight:900;line-height:1.05;background:linear-gradient(135deg,#e2e8f0 30%,#38bdf8 60%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}
h2{font-family:'Playfair Display',serif;font-size:38px;font-weight:900;margin-bottom:8px}
h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.sub{font-size:17px;color:#94a3b8;max-width:540px;line-height:1.7;margin-bottom:40px}
.card{background:rgba(15,23,42,0.8);border-radius:14px;padding:22px;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.tag{font-size:11px;border-radius:4px;padding:2px 8px;display:inline-block;margin:2px}
.btn{padding:12px 22px;border-radius:8px;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-weight:600;font-size:14px;border:1px solid rgba(56,189,248,0.3);background:transparent;color:white;transition:all .2s}
.btn:hover{background:rgba(56,189,248,0.1)}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);border:none}
.ticker{background:rgba(15,23,42,0.85);border-radius:12px;padding:20px 26px;max-width:500px;width:100%;margin-bottom:36px;transition:all .4s}
.timeline-line{position:absolute;left:26px;top:20px;bottom:20px;width:2px;background:linear-gradient(to bottom,#38bdf8,#ef4444);border-radius:1px}
.tl-item{display:flex;gap:22px;margin-bottom:28px;padding-left:56px;position:relative}
.tl-dot{position:absolute;left:16px;top:20px;width:22px;height:22px;border-radius:50%;border:3px solid #050d1a;z-index:1}
.range{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;outline:none}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:white;cursor:pointer;box-shadow:0 0 10px rgba(56,189,248,0.5)}
footer{border-top:1px solid rgba(255,255,255,0.05);padding:20px;text-align:center;font-size:12px;color:#334155;position:relative;z-index:1}
.sdg-badge{background:rgba(255,255,255,0.05);border-radius:8px;padding:10px 14px;display:inline-block;margin:4px}
</style>
</head>
<body>
<div id="root"></div>

  {icon:"🌿",title:"Floating Baira Gardens",cat:"Eco-Agriculture",color:"#10b981",desc:"Traditional Sylheti floating gardens — crops grown on water hyacinth rafts that rise with floodwaters. Zero land needed, flood-proof, and completely sustainable.",tags:["Zero-waste","Flood-resilient","Traditional wisdom"]},
  {icon:"💧",title:"Rainwater Harvesting",cat:"Water Purification",color:"#38bdf8",desc:"Low-cost rooftop collection using bamboo gutters + clay pot filtration. Each unit provides 40L/day of clean drinking water for one family.",tags:["Low-tech","Local materials","Affordable"]},
  {icon:"🌱",title:"Riparian Buffer Zones",cat:"Ecosystem Restoration",color:"#84cc16",desc:"Replanting native trees along the Surma riverbank to reduce erosion, slow floodwater, and restore fish habitats — a natural flood barrier.",tags:["Carbon capture","Biodiversity","Flood control"]},
  {icon:"📡",title:"IoT Flood Sensor Network",cat:"Tech Innovation",color:"#818cf8",desc:"Arduino-based water level sensors at 10 key points. SMS alerts sent to 50,000+ households 6 hours before predicted flooding.",tags:["Early warning","Open source","Community-built"]},
  {icon:"🏘️",title:"Amphibious Housing",cat:"Resilient Infrastructure",color:"#f59e0b",desc:"Homes on buoyant foundations that float during floods and rest on ground in dry seasons — inspired by traditional haor stilt houses.",tags:["Climate adaptation","Low-cost","Local design"]},

];

    // Rain

    // Nav
    React.createElement('nav',null,
      React.createElement('div',{className:"logo"},"SylhetStories"),

        navItems.map(([id,label])=>React.createElement('button',{key:id,className:`nav-btn ${page===id?"active":""}`,onClick:()=>setPage(id)},label))

        React.createElement('div',{style:{display:"flex",gap:"8px",marginBottom:"32px"}},

          React.createElement('div',{className:"tl-dot",style:{background:s.color}}),
          React.createElement('div',{style:{flex:1,background:"rgba(15,23,42,0.8)",border:`1px solid ${s.color}25`,borderLeft:`4px solid ${s.color}`,borderRadius:"12px",padding:"22px"}},
            React.createElement('div',{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",marginBottom:"10px"}},

          React.createElement(AreaChart,{data:rainfallData},
            React.createElement('defs',null,React.createElement('linearGradient',{id:"rg",x1:"0",y1:"0",x2:"0",y2:"1"},React.createElement('stop',{offset:"5%",stopColor:"#38bdf8",stopOpacity:0.3}),React.createElement('stop',{offset:"95%",stopColor:"#38bdf8",stopOpacity:0}))),
            React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"rgba(255,255,255,0.05)"}),
            React.createElement(XAxis,{dataKey:"year",stroke:"#475569",tick:{fontSize:12}}),

    ),

    // WARNING SIMULATOR
    page==="warning"&&React.createElement('div',{className:"section fadeUp"},
      React.createElement('h2',null,"Flood ",React.createElement('span',{style:{color:"#38bdf8"}},"Early Warning")," Simulator"),
      React.createElement('p',{style:{color:"#64748b",marginBottom:"36px"}},"Drag the sliders to simulate rainfall and see Sylhet's flood risk change live."),
      React.createElement('div',{className:"grid-2"},
        React.createElement('div',null,
          React.createElement('div',{style:{...chartStyle}},
            React.createElement('h3',{style:{color:"#38bdf8",marginBottom:"22px"}},"⚙️ Input Parameters"),
            React.createElement('div',{style:{marginBottom:"24px"}},
              React.createElement('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},
                React.createElement('label',{style:{fontSize:"14px",color:"#94a3b8"}},"🌧 Sylhet Rainfall (mm)"),
                React.createElement('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:"18px",fontWeight:700,color:"#38bdf8"}},rainfall+"mm")
              ),
              React.createElement('input',{type:"range",min:0,max:700,value:rainfall,className:"range",style:{background:`linear-gradient(to right,#0ea5e9 0%,#0ea5e9 ${(rainfall/700)*100}%,#1e3a5f ${(rainfall/700)*100}%,#1e3a5f 100%)`},onChange:e=>setRainfall(+e.target.value)})
            ),
            React.createElement('div',null,
              React.createElement('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},
                React.createElement('label',{style:{fontSize:"14px",color:"#94a3b8"}},"☁️ Meghalaya Rainfall (mm)"),
                React.createElement('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:"18px",fontWeight:700,color:"#14b8a6"}},meghalaya+"mm")
              ),
              React.createElement('input',{type:"range",min:0,max:300,value:meghalaya,className:"range",style:{background:`linear-gradient(to right,#14b8a6 0%,#14b8a6 ${(meghalaya/300)*100}%,#1e3a5f ${(meghalaya/300)*100}%,#1e3a5f 100%)`},onChange:e=>setMeghalaya(+e.target.value)})
            )
          ),
          React.createElement('div',{style:{background:alert.bg,border:`1px solid ${alert.color}40`,borderLeft:`5px solid ${alert.color}`,borderRadius:"12px",padding:"20px",marginBottom:"14px"}},
            React.createElement('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:900,color:alert.color}},alert.label),
            React.createElement('div',{style:{fontSize:"13px",color:"#94a3b8",marginTop:"6px"}},"Flood index: ",React.createElement('strong',{style:{color:"white"}},Math.min(floodLevel,999).toFixed(0))),
            React.createElement('div',{style:{marginTop:"10px",background:"rgba(0,0,0,0.3)",borderRadius:"6px",height:"8px",overflow:"hidden"}},
              React.createElement('div',{style:{height:"100%",borderRadius:"6px",width:`${Math.min(100,(floodLevel/1000)*100)}%`,background:`linear-gradient(90deg,#10b981,${alert.color})`,transition:"width .3s,background .3s"}})
            )
          ),
          React.createElement('div',{style:{background:"rgba(15,23,42,0.7)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px",fontSize:"13px",color:"#64748b",lineHeight:1.7}},
            floodLevel>800?"🚨 Evacuate low-lying areas. Emergency response needed. Rivers at critical levels."
            :floodLevel>500?"⚠️ Flood barriers deployed. Avoid riverside areas. Monitor Surma River hourly."
            :floodLevel>300?"👁 Alert issued. Haor communities prepare. Monitor Meghalaya upstream data."
            :"✅ Normal conditions. Continue monitoring. No immediate action required."
          )
        ),
        React.createElement('div',{style:{background:"rgba(15,23,42,0.8)",border:"1px solid rgba(56,189,248,0.15)",borderRadius:"14px",padding:"20px"}},
          React.createElement('h3',{style:{color:"#38bdf8",marginBottom:"14px"}},"🗺️ Live Risk Map"),
          React.createElement('div',{style:{height:"280px"}},React.createElement(FloodMap,{level:mapLevel})),
          React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"12px"}},
            [["#1d4ed8","Safe (<30%)"],["#f59e0b","Watch (30-60%)"],["#f97316","Warning (60-80%)"],["#dc2626","Danger (>80%)"]].map(([c,l])=>
              React.createElement('div',{key:l,style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"11px",color:"#64748b"}},
                React.createElement('div',{style:{width:"10px",height:"10px",borderRadius:"2px",background:c,flexShrink:0}}),l
              )
            )
          )
        )
      )
    ),

    // SOLUTIONS
    page==="solutions"&&React.createElement('div',{className:"section fadeUp"},
      React.createElement('h2',null,"Sustainable ",React.createElement('span',{style:{color:"#10b981"}},"Solutions")),
      React.createElement('p',{style:{color:"#64748b",marginBottom:"36px"}},"Practical, eco-friendly innovations that can protect Sylhet's people and environment."),
      React.createElement('div',{className:"grid-3"},
        solutions.map((s,i)=>React.createElement('div',{key:i,className:"card",style:{border:`1px solid ${s.color}20`,borderTop:`3px solid ${s.color}`}},
          React.createElement('div',{style:{fontSize:"32px",marginBottom:"10px"}},s.icon),
          React.createElement('div',{style:{fontSize:"11px",color:s.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"4px"}},s.cat),
          React.createElement('h3',{style:{fontSize:"17px",marginBottom:"8px"}},s.title),
          React.createElement('p',{style:{fontSize:"13px",color:"#64748b",lineHeight:1.7,marginBottom:"12px"}},s.desc),
          React.createElement('div',null,s.tags.map(t=>React.createElement('span',{key:t,className:"tag",style:{background:`${s.color}15`,color:s.color,border:`1px solid ${s.color}30`}},t)))
        ))
      ),
      React.createElement('div',{style:{marginTop:"36px",background:"rgba(15,23,42,0.8)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"14px",padding:"26px"}},
        React.createElement('h3',{style:{fontFamily:"'Playfair Display',serif",fontSize:"22px",marginBottom:"14px"}},"🌐 UN SDG Alignment"),
        React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:"8px"}},
          [["SDG 2","Zero Hunger","#f59e0b"],["SDG 6","Clean Water","#38bdf8"],["SDG 11","Sustainable Cities","#6366f1"],["SDG 13","Climate Action","#10b981"],["SDG 15","Life on Land","#84cc16"]]
          .map(([code,label,color])=>React.createElement('div',{key:code,className:"sdg-badge",style:{border:`1px solid ${color}30`}},
            React.createElement('div',{style:{fontSize:"11px",color:color,fontWeight:700}},code),
            React.createElement('div',{style:{fontSize:"13px",color:"#94a3b8"}},label)
          ))
        )
      )
    ),

    React.createElement('footer',null,"SylhetStories — Sustainable Project Exhibition | Data: NASA, BMD, UNICEF Bangladesh")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
